version: '3.8'

# ─────────────────────────────────────────────────────────────────
# DEV MODE: Infrastructure only (PostgreSQL + Redis + Qdrant).
# Run backend and frontend locally with hot reload:
#   backend:  cd backend && uvicorn app.main:app --reload --port 8000
#   frontend: cd frontend && npm start
#
# Start:  docker-compose -f docker-compose.dev.yml up -d
# Stop:   docker-compose -f docker-compose.dev.yml down
# ─────────────────────────────────────────────────────────────────

name: sf2dynamics-infra

services:

  postgres:
    image: postgres:16-alpine
    container_name: sf2d_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sf2dynamics
      POSTGRES_USER:     sf2user
      POSTGRES_PASSWORD: sf2password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sf2user -d sf2dynamics"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sf2d_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sf2d_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  default:
    name: sf2dynamics_network
