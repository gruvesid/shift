version: '3.8'

name: sf2dynamics-dev

services:

  # ─────────────────────────────────────────
  # PostgreSQL — primary database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sf2d_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sf2dynamics
      POSTGRES_USER:     sf2user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sf2password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sf2user -d sf2dynamics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis — caching + background job queue
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sf2d_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-}"
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Qdrant — vector store for field mapping
  # suggestions and semantic search
  # ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sf2d_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sf2d_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://sf2user:${POSTGRES_PASSWORD:-sf2password}@postgres:5432/sf2dynamics
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─────────────────────────────────────────
  # React Frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sf2d_frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  default:
    name: sf2dynamics_network
